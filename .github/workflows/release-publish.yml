name: Release Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          raw_version="${{ github.event.release.tag_name }}"
          if [ -z "$raw_version" ]; then
            raw_version="${{ github.event.release.name }}"
          fi

          raw_version="${raw_version#refs/tags/}"
          version="${raw_version#v}"

          if [ -z "$version" ]; then
            echo "Could not resolve release version from release tag/name" >&2
            exit 1
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version '$version' is invalid. Use tags like v1.2.3 or 1.2.3." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew check publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion=${{ steps.version.outputs.version }}

